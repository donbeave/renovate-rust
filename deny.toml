[advisories]
ignore = [
    # Transitive through common crates (e.g. sigstore or image verification if added later); document reason.
]
yanked = "deny"

[licenses]
allow = ["Apache-2.0", "MIT"]
confidence-threshold = 0.8
# Comprehensive exceptions for transitive crates with non-Apache/MIT licenses that are
# accepted in the Rust ecosystem (modeled on strict community workspaces like jackin after license policy review).
# Operator policy remains Apache-2.0/MIT-only for direct deps. Always use nativetls.
exceptions = [
    { crate = "adler2@2.0.1", allow = ["0BSD", "MIT", "Apache-2.0"] },
    { crate = "aho-corasick@1.1.4", allow = ["Unlicense", "MIT"] },
    { crate = "aws-lc-rs@1.17.0", allow = ["ISC", "Apache-2.0"] },
    { crate = "aws-lc-sys@0.41.0", allow = ["ISC", "Apache-2.0", "MIT", "BSD-3-Clause", "MIT-0"] },
    { crate = "bindgen@0.72.1", allow = ["BSD-3-Clause"] },
    { crate = "const_format@0.2.36", allow = ["Zlib"] },
    { crate = "const_format_proc_macros@0.2.34", allow = ["Zlib"] },
    { crate = "curve25519-dalek@4.1.3", allow = ["BSD-3-Clause"] },
    { crate = "dunce@1.0.5", allow = ["CC0-1.0", "MIT-0", "Apache-2.0"] },
    { crate = "ed25519-dalek@2.2.0", allow = ["BSD-3-Clause"] },
    { crate = "fiat-crypto@0.2.9", allow = ["MIT", "Apache-2.0", "BSD-1-Clause"] },
    { crate = "foldhash@0.1.5", allow = ["Zlib"] },
    { crate = "foldhash@0.2.0", allow = ["Zlib"] },
    { crate = "icu_collections@2.2.0", allow = ["Unicode-3.0"] },
    { crate = "icu_locale_core@2.2.0", allow = ["Unicode-3.0"] },
    { crate = "icu_normalizer@2.2.0", allow = ["Unicode-3.0"] },
    { crate = "icu_normalizer_data@2.2.0", allow = ["Unicode-3.0"] },
    { crate = "icu_properties@2.2.0", allow = ["Unicode-3.0"] },
    { crate = "icu_properties_data@2.2.0", allow = ["Unicode-3.0"] },
    { crate = "icu_provider@2.2.0", allow = ["Unicode-3.0"] },
    { crate = "is_ci@1.2.0", allow = ["ISC"] },
    { crate = "konst@0.2.20", allow = ["Zlib"] },
    { crate = "konst_macro_rules@0.2.19", allow = ["Zlib"] },
    { crate = "libloading@0.8.9", allow = ["ISC"] },
    { crate = "linux-raw-sys@0.12.1", allow = ["Apache-2.0 WITH LLVM-exception", "Apache-2.0", "MIT"] },
    { crate = "litemap@0.8.2", allow = ["Unicode-3.0"] },
    { crate = "memchr@2.8.1", allow = ["Unlicense", "MIT"] },
    { crate = "miniz_oxide@0.8.9", allow = ["MIT", "Zlib", "Apache-2.0"] },
    { crate = "option-ext@0.2.0", allow = ["MPL-2.0"] },
    { crate = "potential_utf@0.1.5", allow = ["Unicode-3.0"] },
    { crate = "r-efi@5.3.0", allow = ["MIT", "Apache-2.0"] },
    { crate = "r-efi@6.0.0", allow = ["MIT", "Apache-2.0"] },
    { crate = "rustix@1.1.4", allow = ["Apache-2.0 WITH LLVM-exception", "Apache-2.0", "MIT"] },
    { crate = "ryu@1.0.23", allow = ["Apache-2.0", "BSL-1.0"] },
    { crate = "ryu-js@1.0.2", allow = ["Apache-2.0", "BSL-1.0"] },
    { crate = "same-file@1.0.6", allow = ["Unlicense", "MIT"] },
    { crate = "serial2@0.2.37", allow = ["BSD-2-Clause", "Apache-2.0"] },
    { crate = "subtle@2.6.1", allow = ["BSD-3-Clause"] },
    { crate = "tinystr@0.8.3", allow = ["Unicode-3.0"] },
    { crate = "tinyvec@1.11.0", allow = ["Zlib", "Apache-2.0", "MIT"] },
    { crate = "tinyvec_macros@0.1.1", allow = ["MIT", "Apache-2.0", "Zlib"] },
    { crate = "unicode-ident@1.0.24", allow = ["MIT", "Apache-2.0", "Unicode-3.0"] },
    { crate = "untrusted@0.7.1", allow = ["ISC"] },
    { crate = "untrusted@0.9.0", allow = ["ISC"] },
    { crate = "walkdir@2.5.0", allow = ["Unlicense", "MIT"] },
    { crate = "wasi@0.11.1+wasi-snapshot-preview1", allow = ["Apache-2.0 WITH LLVM-exception", "Apache-2.0", "MIT"] },
    { crate = "wasip2@1.0.3+wasi-0.2.9", allow = ["Apache-2.0 WITH LLVM-exception", "Apache-2.0", "MIT"] },
    { crate = "wasip3@0.4.0+wasi-0.3.0-rc-2026-01-06", allow = ["Apache-2.0 WITH LLVM-exception", "Apache-2.0", "MIT"] },
    { crate = "webpki-root-certs@1.0.7", allow = ["CDLA-Permissive-2.0"] },
    { crate = "winapi-util@0.1.11", allow = ["Unlicense", "MIT"] },
    { crate = "wit-bindgen@0.51.0", allow = ["Apache-2.0 WITH LLVM-exception", "Apache-2.0", "MIT"] },
    { crate = "wit-bindgen@0.57.1", allow = ["Apache-2.0 WITH LLVM-exception", "Apache-2.0", "MIT"] },
    { crate = "writeable@0.6.3", allow = ["Unicode-3.0"] },
    { crate = "yoke@0.8.3", allow = ["Unicode-3.0"] },
    { crate = "yoke-derive@0.8.2", allow = ["Unicode-3.0"] },
    { crate = "zerocopy@0.8.50", allow = ["BSD-2-Clause", "Apache-2.0", "MIT"] },
    { crate = "zerocopy-derive@0.8.50", allow = ["BSD-2-Clause", "Apache-2.0", "MIT"] },
    { crate = "zerofrom@0.1.8", allow = ["Unicode-3.0"] },
    { crate = "zerofrom-derive@0.1.7", allow = ["Unicode-3.0"] },
    { crate = "zerotrie@0.2.4", allow = ["Unicode-3.0"] },
    { crate = "zerovec@0.11.6", allow = ["Unicode-3.0"] },
    { crate = "zerovec-derive@0.11.3", allow = ["Unicode-3.0"] },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { crate = "rustls", reason = "Always use nativetls (system CAs, corporate proxies, keychains) -- never pure rustls." },
    { crate = "rustls-native-certs", reason = "Always use nativetls -- never pure rustls." },
    { crate = "rustls-pemfile", reason = "Always use nativetls -- never pure rustls." },
    { crate = "hyper-rustls", reason = "Always use nativetls -- never pure rustls." },
    { crate = "yaml-rust", reason = "Use serde_yaml for YAML parsing." },
]
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
