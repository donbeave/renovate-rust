[profile.default]
fail-fast = false
slow-timeout = { period = "30s", terminate-after = 4 }
status-level = "fail"
final-status-level = "flaky"

[profile.ci]
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 4 }
status-level = "all"
final-status-level = "all"
retries = { backoff = "exponential", count = 2, delay = "1s", jitter = true }
